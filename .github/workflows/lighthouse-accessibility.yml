name: Lighthouse Accessibility Audit

on:
  pull_request:
    branches: [main]

jobs:
  lhci:
    name: QA Inclusivo – Etiquetas de Accesibilidad
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm ci

      # 4. Compilar Expo para web
      - name: Build Expo Web
        run: npx expo export --platform web
        env:
          # Expo necesita esto en CI para no pedir interacción
          CI: true

      # 5. Instalar Lighthouse CI globalmente
      - name: Install LHCI
        run: npm install -g @lhci/cli@0.14.x

      # 6. Ejecutar auditoría de accesibilidad
      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}